<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Verify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background: linear-gradient(135deg, #0a4d2e 0%, #052e1c 100%); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;">
    <div class="w-full max-w-md text-center">
        <h1 style="font-size: 36px; font-weight: 900; margin-bottom: 8px; text-transform: uppercase; font-style: italic; color: #10b981;">DPAY.</h1>
        <p style="color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 40px;">Enter your verification code</p>

        <div class="space-y-4 text-left">
            <input type="text" id="verification-code" placeholder="Enter verification code" 
                style="width: 100%; padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); outline: none; color: white; transition: all 0.3s;">
            
            <button onclick="verifyCode()" id="verify-btn" 
                style="width: 100%; background: linear-gradient(135deg, #0a4d2e 0%, #0d6b3f 100%); color: white; padding: 20px; border-radius: 16px; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; margin-top: 16px;">Verify Code</button>
        </div>

        <p class="mt-10 text-sm text-slate-500 font-medium">
            <a href="signup.html" class="text-blue-500 font-bold underline">Back to Sign Up</a>
        </p>
    </div>

    <script>
        function checkCode() {
            const userTyped = document.getElementById('verification-code').value;
            let correctOTP = localStorage.getItem("userOTP");

            // fallback for old key
            if (!correctOTP) {
                correctOTP = localStorage.getItem("verificationCode");
            }

            console.log("Entered code:", userTyped, "Stored code:", correctOTP);

            // We use == instead of === to make sure it matches even if one is text
            if (userTyped == correctOTP) { 
                alert("Success! Welcome to DPay.");
                localStorage.setItem('emailVerified', 'true'); // Mark as verified
                localStorage.removeItem('userOTP'); // Clean up OTP
                window.location.href = "dashboard.html"; 
            } else {
                alert("Invalid code. Please check your email.");
            }
        }

        // keep verifyCode alias for backward compatibility if used elsewhere
        window.verifyCode = checkCode;
    </script>
</body>
</html></content>
