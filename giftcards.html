<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPay | Sell Gift Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #05070a; }
        .bento-card { background: rgba(17, 24, 39, 0.6); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-200 pb-24">

    <div class="p-6 flex items-center gap-4">
        <a href="index.html" class="w-10 h-10 bento-card rounded-full flex items-center justify-center">
            <i class="fas fa-chevron-left text-xs text-blue-500"></i>
        </a>
        <h2 class="text-xl font-black tracking-tight text-white">Sell Gift Cards</h2>
    </div>

    <div class="px-6 space-y-6">
        <div class="bento-card p-5 rounded-3xl flex items-center justify-between border-l-4 border-l-green-500">
            <div>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Hot Rate</p>
                <p class="font-bold text-sm mt-1">Steam (UK) @ ₦1,150/$</p>
            </div>
            <i class="fas fa-fire text-orange-500"></i>
        </div>

        <div class="bento-card p-6 rounded-[2.5rem]">
            <form class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Card Type</label>
                    <select class="w-full bg-[#0b0f1a] border border-white/5 rounded-2xl p-4 text-sm font-bold focus:border-blue-500 outline-none transition">
                        <option>Amazon Card</option>
                        <option>Steam Wallet</option>
                        <option>iTunes / Apple</option>
                        <option>Google Play</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Upload Front & Back</label>
                    <div onclick="document.getElementById('file-input').click()" class="w-full bg-[#0b0f1a] border-2 border-dashed border-white/10 rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer hover:border-blue-500/50 transition">
                        <i class="fas fa-camera text-2xl text-slate-600 mb-2"></i>
                        <p class="text-[10px] font-bold text-slate-500">TAP TO SNAP OR UPLOAD</p>
                        <input type="file" id="file-input" class="hidden" multiple>
                    </div>
                </div>

                <button type="button" onclick="alert('Card uploaded for verification. Check your wallet in 10 mins.')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black text-sm transition-all shadow-lg shadow-blue-600/20">
                    Process Exchange
                </button>
            </form>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#05070a]/90 backdrop-blur-xl border-t border-white/5 px-8 py-4 flex justify-between items-center z-[100]">
        <a href="index.html" class="flex flex-col items-center text-slate-600">
            <i class="fas fa-home text-lg mb-1"></i>
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center text-slate-600">
            <i class="fas fa-wallet text-lg mb-1"></i>
            <span class="text-[10px] font-bold">Wallet</span>
        </a>
        <a href="vtu.html" class="flex flex-col items-center text-slate-600">
            <i class="fas fa-bolt text-lg mb-1"></i>
            <span class="text-[10px] font-bold">Services</span>
        </a>
    </div>

</body>
</html>
