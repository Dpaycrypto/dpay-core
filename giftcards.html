<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Buy Gift Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; }
        .card-glass { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="flex items-center gap-4 mb-8">
        <a href="index.html" class="w-10 h-10 card-glass rounded-full flex items-center justify-center">
            <i class="fas fa-chevron-left text-blue-500"></i>
        </a>
        <h1 class="text-2xl font-bold">Gift Cards</h1>
    </div>

    <div class="mb-8 relative">
        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
        <input type="text" placeholder="Search cards..." class="w-full bg-slate-900 border border-slate-800 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:border-blue-500">
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="card-glass p-4 rounded-2xl flex flex-col items-center text-center gap-3">
            <div class="w-16 h-16 bg-white rounded-xl flex items-center justify-center text-black text-3xl font-bold">
                <i class="fab fa-amazon"></i>
            </div>
            <p class="font-semibold text-sm">Amazon US</p>
            <button class="w-full py-2 bg-blue-600 rounded-lg text-xs font-bold">BUY NOW</button>
        </div>

        <div class="card-glass p-4 rounded-2xl flex flex-col items-center text-center gap-3">
            <div class="w-16 h-16 bg-gradient-to-br from-pink-500 to-purple-600 rounded-xl flex items-center justify-center text-3xl">
                <i class="fab fa-apple"></i>
            </div>
            <p class="font-semibold text-sm">iTunes/Apple</p>
            <button class="w-full py-2 bg-blue-600 rounded-lg text-xs font-bold">BUY NOW</button>
        </div>

        <div class="card-glass p-4 rounded-2xl flex flex-col items-center text-center gap-3">
            <div class="w-16 h-16 bg-slate-800 rounded-xl flex items-center justify-center text-3xl">
                <i class="fab fa-steam"></i>
            </div>
            <p class="font-semibold text-sm">Steam Card</p>
            <button class="w-full py-2 bg-blue-600 rounded-lg text-xs font-bold">BUY NOW</button>
        </div>

        <div class="card-glass p-4 rounded-2xl flex flex-col items-center text-center gap-3">
            <div class="w-16 h-16 bg-green-600 rounded-xl flex items-center justify-center text-3xl text-white">
                <i class="fab fa-google-play"></i>
            </div>
            <p class="font-semibold text-sm">Google Play</p>
            <button class="w-full py-2 bg-blue-600 rounded-lg text-xs font-bold">BUY NOW</button>
        </div>
    </div>

    <div class="mt-8 p-4 bg-blue-900/20 border border-blue-500/30 rounded-xl flex gap-3">
        <i class="fas fa-info-circle text-blue-400 mt-1"></i>
        <p class="text-xs text-blue-200">Gift card codes are delivered instantly to your registered email address upon successful payment.</p>
    </div>

</body>
</html>
