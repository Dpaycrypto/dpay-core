<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Withdraw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">
    <div class="flex items-center gap-4 mb-8">
        <a href="dashboard.html" class="w-10 h-10 card-glass rounded-full flex items-center justify-center">
            <i class="fas fa-arrow-left text-blue-500"></i>
        </a>
        <h1 class="text-2xl font-bold">Withdraw</h1>
    </div>

    <div class="space-y-6">
        <div>
            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block">Bank Name / Network</label>
            <input type="text" placeholder="Select Bank" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none focus:border-blue-500 transition-all">
        </div>

        <div>
            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block">Account Number / Address</label>
            <input type="text" placeholder="Enter recipient info" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none focus:border-blue-500 transition-all">
        </div>

        <div>
            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block">Amount</label>
            <input type="number" placeholder="₦0.00" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none focus:border-blue-500 transition-all">
        </div>

        <button class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-900/20 active:scale-95 transition-all">
            Confirm Withdrawal
        </button>
    </div>
</body>
</html>
