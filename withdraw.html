<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Withdraw</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0B0E11; color: #FFFFFF; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .card { background: #161B22; border: 1px solid #1E293B; }
        .field { background: #0f141b; border: 1px solid #1E293B; color: #FFFFFF; }
        .field::placeholder { color: #94A3B8; }
        .muted { color: #94A3B8; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="dashboard.html" class="w-10 h-10 card rounded-full flex items-center justify-center">
                <i class="fas fa-arrow-left" style="color:#306AF1;"></i>
            </a>
            <h1 class="text-2xl font-bold">Withdraw</h1>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] uppercase tracking-widest muted font-bold mb-2 block">Bank Name / Network</label>
                <input type="text" placeholder="Select Bank" class="w-full field rounded-2xl py-4 px-5 focus:outline-none focus:border-[#306AF1] transition-all">
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest muted font-bold mb-2 block">Account Number / Address</label>
                <input type="text" placeholder="Enter recipient info" class="w-full field rounded-2xl py-4 px-5 focus:outline-none focus:border-[#306AF1] transition-all">
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest muted font-bold mb-2 block">Amount</label>
                <input type="number" placeholder="N0.00" class="w-full field rounded-2xl py-4 px-5 focus:outline-none focus:border-[#306AF1] transition-all">
            </div>

            <button class="w-full py-5 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-900/20 active:scale-95 transition-all" style="background:#306AF1; color:#fff;">
                Confirm Withdrawal
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4",
            authDomain: "dpay-core.firebaseapp.com",
            projectId: "dpay-core",
            storageBucket: "dpay-core.firebasestorage.app",
            messagingSenderId: "415239564375",
            appId: "1:415239564375:web:ac372f11b7243c21a90712"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
        });
    </script>
</body>
</html>
