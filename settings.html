<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - DPay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a4d2e 0%, #052e1c 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
        }

        .settings-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            color: #0a4d2e;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0a4d2e;
            box-shadow: 0 0 0 4px rgba(10, 77, 46, 0.1);
        }

        .form-group input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0a4d2e 0%, #0d6b3f 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10, 77, 46, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: white;
            color: #0a4d2e;
            border: 2px solid #0a4d2e;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #0a4d2e;
            color: white;
        }

        .edit-toggle {
            background: rgba(10, 77, 46, 0.1);
            color: #0a4d2e;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            float: right;
            transition: all 0.3s;
        }

        .edit-toggle:hover {
            background: rgba(10, 77, 46, 0.2);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #e0e0e0, transparent);
            margin: 30px 0;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            .settings-card {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .btn-secondary {
                margin-left: 0;
                margin-top: 10px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Settings</h1>
        </div>

        <!-- Personal Information Section -->
        <div class="settings-card">
            <div class="section-title">
                <i class="fas fa-user-circle"></i>
                Personal Information
                <button class="edit-toggle" id="editPersonalBtn" onclick="toggleEditPersonal()">
                    <i class="fas fa-edit"></i> Edit
                </button>
            </div>

            <div class="success-message" id="personalSuccess">
                <i class="fas fa-check-circle"></i>
                <span>Personal information updated successfully!</span>
            </div>

            <div class="error-message" id="personalError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="personalErrorText"></span>
            </div>

            <form id="personalInfoForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" disabled required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" disabled required>
                </div>

                <div class="form-group">
                    <label>Phone Number (Optional)</label>
                    <input type="tel" id="phone" disabled placeholder="+234 XXX XXX XXXX">
                </div>

                <div id="personalButtons" style="display: none;">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                    <button type="button" class="btn-secondary" onclick="cancelEditPersonal()">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Privacy & Security Section -->
        <div class="settings-card">
            <div class="section-title">
                <i class="fas fa-shield-alt"></i>
                Privacy & Security
            </div>

            <div class="success-message" id="passwordSuccess">
                <i class="fas fa-check-circle"></i>
                <span>Password changed successfully!</span>
            </div>

            <div class="error-message" id="passwordError">
                <i class="fas fa-exclamation-circle"></i>
                <span id="passwordErrorText"></span>
            </div>

            <form id="changePasswordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" required placeholder="Enter current password">
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" required placeholder="Enter new password (min 6 characters)">
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Re-enter new password">
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fas fa-lock"></i> Change Password
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, updateProfile, updateEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4",
            authDomain: "dpay-core.firebaseapp.com",
            projectId: "dpay-core",
            storageBucket: "dpay-core.firebasestorage.app",
            messagingSenderId: "415239564375",
            appId: "1:415239564375:web:ac372f11b7243c21a90712"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let originalData = {};

        // Check authentication
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData();
            } else {
                window.location.href = 'login.html';
            }
        });

        // Load user data
        async function loadUserData() {
            try {
                const userDoc = await getDoc(doc(db, 'user', currentUser.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('fullName').value = userData.fullName || currentUser.displayName || '';
                    document.getElementById('phone').value = userData.phone || '';
                } else {
                    // Create initial user document
                    const userName = localStorage.getItem('userName') || currentUser.displayName || '';
                    document.getElementById('fullName').value = userName;
                    
                    await setDoc(doc(db, 'user', currentUser.uid), {
                        fullName: userName,
                        email: currentUser.email,
                        phone: '',
                        createdAt: new Date().toISOString()
                    });
                }

                document.getElementById('email').value = currentUser.email;
                
                // Store original data
                originalData = {
                    fullName: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value
                };
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        // Toggle edit mode for personal info
        window.toggleEditPersonal = function() {
            const inputs = ['fullName', 'phone'];
            const isDisabled = document.getElementById('fullName').disabled;
            
            inputs.forEach(id => {
                document.getElementById(id).disabled = !isDisabled;
            });

            document.getElementById('personalButtons').style.display = isDisabled ? 'block' : 'none';
            document.getElementById('editPersonalBtn').innerHTML = isDisabled 
                ? '<i class="fas fa-times"></i> Cancel' 
                : '<i class="fas fa-edit"></i> Edit';
        };

        // Cancel edit
        window.cancelEditPersonal = function() {
            document.getElementById('fullName').value = originalData.fullName;
            document.getElementById('phone').value = originalData.phone;
            window.toggleEditPersonal();
        };

        // Save personal information
        document.getElementById('personalInfoForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentUser) {
                const errorMsg = document.getElementById('personalError');
                document.getElementById('personalErrorText').textContent = 'Session not ready. Please wait a second and try again.';
                errorMsg.style.display = 'flex';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 5000);
                return;
            }
            
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!fullName) {
                const errorMsg = document.getElementById('personalError');
                document.getElementById('personalErrorText').textContent = 'Full name cannot be empty.';
                errorMsg.style.display = 'flex';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 5000);
                return;
            }

            try {
                // Use setDoc with merge to avoid failing if the user document is missing.
                await setDoc(doc(db, 'user', currentUser.uid), {
                    fullName: fullName,
                    email: currentUser.email,
                    phone: phone,
                    updatedAt: new Date().toISOString()
                }, { merge: true });

                // Update Firebase Auth display name
                await updateProfile(currentUser, {
                    displayName: fullName
                });

                // Update localStorage
                localStorage.setItem('userName', fullName);

                // Update original data
                originalData.fullName = fullName;
                originalData.phone = phone;

                // Show success message
                const successMsg = document.getElementById('personalSuccess');
                successMsg.style.display = 'flex';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);

                // Exit edit mode
                window.toggleEditPersonal();
            } catch (error) {
                console.error('Error updating personal info:', error);
                const errorMsg = document.getElementById('personalError');
                document.getElementById('personalErrorText').textContent = error.message;
                errorMsg.style.display = 'flex';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 5000);
            }
        });

        // Change password
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords
            if (newPassword !== confirmPassword) {
                const errorMsg = document.getElementById('passwordError');
                document.getElementById('passwordErrorText').textContent = 'New passwords do not match!';
                errorMsg.style.display = 'flex';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 5000);
                return;
            }

            if (newPassword.length < 6) {
                const errorMsg = document.getElementById('passwordError');
                document.getElementById('passwordErrorText').textContent = 'Password must be at least 6 characters!';
                errorMsg.style.display = 'flex';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 5000);
                return;
            }

            try {
                // Re-authenticate user
                const credential = EmailAuthProvider.credential(
                    currentUser.email,
                    currentPassword
                );
                await reauthenticateWithCredential(currentUser, credential);

                // Update password
                await updatePassword(currentUser, newPassword);

                // Show success message
                const successMsg = document.getElementById('passwordSuccess');
                successMsg.style.display = 'flex';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);

                // Clear form
                document.getElementById('changePasswordForm').reset();
            } catch (error) {
                console.error('Error changing password:', error);
                let errorMessage = 'Failed to change password. Please try again.';
                
                if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Current password is incorrect!';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'New password is too weak!';
                }

                const errorMsg = document.getElementById('passwordError');
                document.getElementById('passwordErrorText').textContent = errorMessage;
                errorMsg.style.display = 'flex';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
