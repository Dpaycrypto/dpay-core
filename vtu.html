<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Buy Airtime & Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; }
        .card-glass { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .network-btn { transition: all 0.3s ease; border: 2px solid transparent; }
        .network-btn:active { border-color: #3b82f6; transform: scale(0.95); }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="flex items-center gap-4 mb-8">
        <a href="index.html" class="w-10 h-10 card-glass rounded-full flex items-center justify-center">
            <i class="fas fa-chevron-left text-blue-500"></i>
        </a>
        <h1 class="text-2xl font-bold">Bill Payments</h1>
    </div>

    <p class="text-slate-400 text-sm mb-4 uppercase tracking-widest font-semibold">Select Network</p>
    <div class="grid grid-cols-4 gap-3 mb-8">
        <button class="network-btn card-glass p-3 rounded-xl flex flex-col items-center gap-2">
            <div class="w-10 h-10 bg-yellow-400 rounded-full flex items-center justify-center text-black font-bold text-xs text-center leading-none">MTN</div>
        </button>
        <button class="network-btn card-glass p-3 rounded-xl flex flex-col items-center gap-2">
            <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-xs text-center leading-none">Airtel</div>
        </button>
        <button class="network-btn card-glass p-3 rounded-xl flex flex-col items-center gap-2">
            <div class="w-10 h-10 bg-green-600 rounded-full flex items-center justify-center text-white font-bold text-xs text-center leading-none">GLO</div>
        </button>
        <button class="network-btn card-glass p-3 rounded-xl flex flex-col items-center gap-2">
            <div class="w-10 h-10 bg-black border border-slate-700 rounded-full flex items-center justify-center text-yellow-500 font-bold text-[10px] text-center leading-none">9mobile</div>
        </button>
    </div>

    <div class="space-y-6">
        <div>
            <label class="text-xs text-slate-500 mb-2 block uppercase">Phone Number</label>
            <input type="number" placeholder="08012345678" class="w-full bg-slate-900 border border-slate-800 rounded-xl py-4 px-4 focus:outline-none focus:border-blue-500">
        </div>

        <div>
            <label class="text-xs text-slate-500 mb-2 block uppercase">Select Amount</label>
            <div class="grid grid-cols-3 gap-2">
                <button class="card-glass py-3 rounded-lg text-sm hover:bg-blue-600">₦100</button>
                <button class="card-glass py-3 rounded-lg text-sm hover:bg-blue-600">₦500</button>
                <button class="card-glass py-3 rounded-lg text-sm hover:bg-blue-600">₦1,000</button>
            </div>
            <input type="number" placeholder="Or enter custom amount" class="w-full bg-slate-900 border border-slate-800 rounded-xl py-4 px-4 mt-3 focus:outline-none focus:border-blue-500">
        </div>

        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all">
            PURCHASE AIRTIME
        </button>
    </div>

</body>
</html>
