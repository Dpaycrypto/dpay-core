<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">
    <div class="flex items-center gap-4 mb-8">
        <a href="dashboard.html" class="text-slate-400"><i class="fas fa-chevron-left text-xl"></i></a>
        <h1 class="text-xl font-bold">Profile Settings</h1>
    </div>

    <div class="text-center mb-8">
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-blue-400 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold border-4 border-slate-900 shadow-2xl">DU</div>
        <h2 class="text-2xl font-black">DPay User</h2>
        <p class="text-blue-500 text-xs font-bold uppercase tracking-widest mt-1">Verified Trader</p>
    </div>

    <div class="space-y-4 mb-8">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Account Security</p>
        <div class="card-glass p-4 rounded-3xl flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500"><i class="fas fa-envelope"></i></div>
                <div><p class="text-sm font-bold">Email Address</p><p class="text-[10px] text-slate-500">Not verified</p></div>
            </div>
            <button class="text-[10px] font-black text-blue-500 border border-blue-500/20 px-4 py-2 rounded-xl">VERIFY</button>
        </div>
        <div class="card-glass p-4 rounded-3xl flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500"><i class="fas fa-phone"></i></div>
                <div><p class="text-sm font-bold">Phone Number</p><p class="text-[10px] text-slate-500">Not verified</p></div>
            </div>
            <button class="text-[10px] font-black text-blue-500 border border-blue-500/20 px-4 py-2 rounded-xl">VERIFY</button>
        </div>
    </div>

    <div class="space-y-4">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Preferences</p>
        <div class="card-glass p-4 rounded-3xl flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-800 rounded-2xl flex items-center justify-center"><i class="fas fa-bell"></i></div>
                <p class="text-sm font-bold">Notifications</p>
            </div>
            <i class="fas fa-chevron-right text-slate-700"></i>
        </div>
        <div class="card-glass p-4 rounded-3xl flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-800 rounded-2xl flex items-center justify-center"><i class="fas fa-shield-alt"></i></div>
                <p class="text-sm font-bold">Two-Factor Auth</p>
            </div>
            <i class="fas fa-chevron-right text-slate-700"></i>
        </div>
    </div>

    <button onclick="window.location.replace('login.html')" class="w-full mt-10 py-5 text-red-500 font-black text-xs tracking-widest uppercase">Logout Account</button>
</body>
</html>
