<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Profile & Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .input-group input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 pb-20">

    <div class="flex items-center gap-4 mb-8">
        <a href="dashboard.html" class="w-10 h-10 card-glass rounded-full flex items-center justify-center">
            <i class="fas fa-arrow-left text-blue-500"></i>
        </a>
        <h1 class="text-xl font-black">Account Settings</h1>
    </div>

    <div class="text-center mb-8">
        <div class="relative w-24 h-24 mx-auto mb-4">
            <div class="w-full h-full bg-blue-600 rounded-full flex items-center justify-center text-3xl font-black shadow-2xl shadow-blue-900/40">
                DU
            </div>
            <button class="absolute bottom-0 right-0 bg-slate-800 w-8 h-8 rounded-full border-2 border-[#05070a] flex items-center justify-center text-[10px]">
                <i class="fas fa-camera"></i>
            </button>
        </div>
        <h2 class="text-2xl font-black tracking-tight">DPay User</h2>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">ID: #882910</p>
    </div>

    <div class="space-y-4 mb-10">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-2">Personal Information</p>
        <div class="card-glass p-6 rounded-[2rem] space-y-5">
            <div class="input-group">
                <label class="text-[9px] uppercase font-black text-slate-500 mb-2 block">Full Name</label>
                <input type="text" value="DPay User" class="w-full py-3 px-4 rounded-xl outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <div class="input-group">
                <label class="text-[9px] uppercase font-black text-slate-500 mb-2 block">Email Address</label>
                <input type="email" value="user@example.com" class="w-full py-3 px-4 rounded-xl outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <button class="w-full bg-blue-600/10 text-blue-500 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Update Profile</button>
        </div>
    </div>

    <div class="space-y-4 mb-10">
        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] ml-2">Security & Privacy</p>
        <div class="card-glass p-6 rounded-[2rem] space-y-5">
            <div class="input-group">
                <label class="text-[9px] uppercase font-black text-slate-500 mb-2 block">Current Password</label>
                <input type="password" placeholder="••••••••" class="w-full py-3 px-4 rounded-xl outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <div class="input-group">
                <label class="text-[9px] uppercase font-black text-slate-500 mb-2 block">New Password</label>
                <input type="password" placeholder="••••••••" class="w-full py-3 px-4 rounded-xl outline-none focus:border-blue-500 transition-all text-sm">
            </div>
            <button class="w-full bg-slate-800 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Change Password</button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-10">
        <div class="card-glass p-4 rounded-2xl flex items-center gap-3">
            <i class="fas fa-check-circle text-slate-700"></i>
            <span class="text-[10px] font-bold text-slate-500 uppercase">Gmail Verified</span>
        </div>
        <div class="card-glass p-4 rounded-2xl flex items-center gap-3">
            <i class="fas fa-check-circle text-slate-700"></i>
            <span class="text-[10px] font-bold text-slate-500 uppercase">Phone Verified</span>
        </div>
    </div>

    <button onclick="window.location.replace('login.html')" class="w-full py-4 text-red-500 font-black text-[10px] uppercase tracking-[0.3em] border border-red-500/10 rounded-2xl bg-red-500/5">
        Delete Session & Logout
    </button>

</body>
</html>
