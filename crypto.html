<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Crypto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0B0E11;
            color: #FFFFFF;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid #1E293B;
            background: #161B22;
            color: #306AF1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .title {
            font-size: 28px;
            font-weight: 800;
            color: #FFFFFF;
        }

        .section-title {
            color: #94A3B8;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
        }

        .card {
            background: #161B22;
            border: 1px solid #1E293B;
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 18px;
        }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .asset-btn {
            border: 1px solid #1E293B;
            background: #0f141c;
            border-radius: 14px;
            padding: 14px;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .asset-btn:hover {
            border-color: #306AF1;
            transform: translateY(-1px);
        }

        .asset-btn.active {
            border-color: #306AF1;
            box-shadow: 0 0 0 1px #306AF1 inset;
            background: rgba(48, 106, 241, 0.12);
        }

        .asset-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .asset-name {
            font-size: 14px;
            font-weight: 700;
        }

        .asset-symbol {
            color: #94A3B8;
            font-size: 12px;
            font-weight: 600;
        }

        .rate-box {
            background: #161B22;
            border: 1px solid #1E293B;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 28px;
        }

        .rate-value {
            color: #FFFFFF;
            font-size: 34px;
            font-weight: 900;
            margin-top: 8px;
        }

        .rate-note {
            color: #94A3B8;
            font-size: 13px;
            margin-top: 10px;
        }

        .transfer-btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 18px;
            background: #306AF1;
            color: #FFFFFF;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .transfer-btn:hover {
            filter: brightness(1.08);
            box-shadow: 0 12px 28px rgba(48, 106, 241, 0.35);
        }

        .transfer-btn:active {
            transform: translateY(1px);
        }

        @media (max-width: 560px) {
            .asset-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <a href="dashboard.html" class="back-btn" aria-label="Back to dashboard">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h1 class="title">Crypto</h1>
        </div>

        <div class="section-title">Select Asset</div>
        <div class="card">
            <div class="asset-grid">
                <button class="asset-btn active" type="button" onclick="selectAsset('BTC', this)">
                    <div class="asset-row">
                        <i class="fab fa-bitcoin" style="color:#f7931a;"></i>
                        <span class="asset-name">Bitcoin</span>
                    </div>
                    <div class="asset-symbol">BTC</div>
                </button>
                <button class="asset-btn" type="button" onclick="selectAsset('ETH', this)">
                    <div class="asset-row">
                        <i class="fab fa-ethereum" style="color:#627eea;"></i>
                        <span class="asset-name">Ethereum</span>
                    </div>
                    <div class="asset-symbol">ETH</div>
                </button>
                <button class="asset-btn" type="button" onclick="selectAsset('USDT', this)">
                    <div class="asset-row">
                        <i class="fas fa-coins" style="color:#26a17b;"></i>
                        <span class="asset-name">Tether</span>
                    </div>
                    <div class="asset-symbol">USDT</div>
                </button>
            </div>
        </div>

        <div class="section-title">Market Rate</div>
        <div class="rate-box">
            <div style="color:#94A3B8; font-size:13px; font-weight:700;">Current Exchange Rate (NGN)</div>
            <div id="marketRate" class="rate-value">1 BTC = NGN 162,500,000</div>
            <div class="rate-note" id="rateNote">Rates update periodically and may change before final confirmation.</div>
            <div id="rateStatus" style="color:#94A3B8; font-size:12px; margin-top:8px;">Loading live rates...</div>
        </div>

        <button class="transfer-btn" type="button" onclick="transferToWallet()">Transfer to Wallet</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4",
            authDomain: "dpay-core.firebaseapp.com",
            projectId: "dpay-core",
            storageBucket: "dpay-core.firebasestorage.app",
            messagingSenderId: "415239564375",
            appId: "1:415239564375:web:ac372f11b7243c21a90712"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedAsset = 'BTC';
        const assetRates = {
            BTC: 162500000,
            ETH: 8700000,
            USDT: 1600
        };
        const rateStatus = document.getElementById('rateStatus');
        const rateNote = document.getElementById('rateNote');

        function formatNaira(value) {
            return new Intl.NumberFormat('en-NG').format(value);
        }

        window.selectAsset = function(asset, element) {
            selectedAsset = asset;
            document.querySelectorAll('.asset-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            const activeRate = assetRates[asset] || 0;
            document.getElementById('marketRate').innerText = `1 ${asset} = NGN ${formatNaira(activeRate)}`;
        };

        window.transferToWallet = function() {
            alert(`Transfer started for ${selectedAsset}. Please complete wallet transfer details on the next step.`);
        };

        function bindLiveRates() {
            const settingsRef = doc(db, 'settings', 'app');

            onSnapshot(settingsRef, (snapshot) => {
                if (!snapshot.exists()) {
                    rateStatus.innerText = 'Live rates not found. Using default values.';
                    return;
                }

                const data = snapshot.data();
                const cryptoRates = data.cryptoRates || {};

                const btcRate = Number(cryptoRates.BTC || data.btcRate);
                const ethRate = Number(cryptoRates.ETH || data.ethRate);
                const usdtRate = Number(cryptoRates.USDT || data.nairaPerUsdt || data.usdtRate || data.rate);

                if (Number.isFinite(btcRate) && btcRate > 0) {
                    assetRates.BTC = btcRate;
                }
                if (Number.isFinite(ethRate) && ethRate > 0) {
                    assetRates.ETH = ethRate;
                }
                if (Number.isFinite(usdtRate) && usdtRate > 0) {
                    assetRates.USDT = usdtRate;
                }

                document.getElementById('marketRate').innerText = `1 ${selectedAsset} = NGN ${formatNaira(assetRates[selectedAsset] || 0)}`;
                rateNote.innerText = 'Live admin rates are active.';
                rateStatus.innerText = `Synced: BTC ${formatNaira(assetRates.BTC)}, ETH ${formatNaira(assetRates.ETH)}, USDT ${formatNaira(assetRates.USDT)}`;
            }, (error) => {
                console.error('Live rate sync failed:', error);
                rateStatus.innerText = `Could not load live rates (${error.code || 'unknown error'}).`;
            });
        }

        bindLiveRates();
    </script>
</body>
</html>
