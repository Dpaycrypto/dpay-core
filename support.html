<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-6">
    <div class="flex items-center gap-4 mb-8">
        <a href="dashboard.html" class="w-10 h-10 card-glass rounded-full flex items-center justify-center"><i class="fas fa-arrow-left text-blue-500"></i></a>
        <h1 class="text-2xl font-bold">Help Center</h1>
    </div>

    <div class="space-y-4">
        <div class="card-glass p-6 rounded-[2rem] flex items-center gap-4">
            <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500 text-2xl"><i class="fab fa-whatsapp"></i></div>
            <div>
                <p class="font-bold">WhatsApp Support</p>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Fastest Response</p>
            </div>
        </div>

        <div class="card-glass p-6 rounded-[2rem] flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-2xl"><i class="fas fa-envelope"></i></div>
            <div>
                <p class="font-bold">Email Support</p>
                <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">support@dpay.com</p>
            </div>
        </div>
    </div>
</body>
</html>
