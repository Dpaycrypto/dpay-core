<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .card-glass { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn:active { transform: scale(0.90); transition: 0.2s; }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="flex justify-between items-center mb-8">
        <div>
            <p class="text-slate-500 text-xs uppercase tracking-widest font-bold">Welcome back,</p>
            <h1 class="text-2xl font-bold">DPay User</h1>
        </div>
        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center border-2 border-blue-400/30">
            <i class="fas fa-user"></i>
        </div>
    </div>

    <div class="card-glass p-6 rounded-[2rem] mb-8 bg-gradient-to-br from-blue-600/20 to-transparent">
        <p class="text-slate-400 text-sm mb-1">Total Balance</p>
        <h2 class="text-4xl font-black mb-6">₦250,000.00</h2>
        
        <div class="flex gap-4">
            <a href="deposit.html" class="flex-1 bg-blue-600 py-3 rounded-xl text-center text-sm font-bold shadow-lg shadow-blue-900/40 nav-btn">
                <i class="fas fa-plus-circle mr-2"></i>Deposit
            </a>
            <a href="withdraw.html" class="flex-1 bg-slate-800 py-3 rounded-xl text-center text-sm font-bold nav-btn">
                <i class="fas fa-arrow-up mr-2"></i>Withdraw
            </a>
        </div>
    </div>

    <h3 class="text-sm font-bold mb-4 uppercase tracking-wider text-slate-500">Quick Services</h3>
    <div class="grid grid-cols-4 gap-4 mb-8">
        
        <a href="vtu.html" class="flex flex-col items-center gap-2 nav-btn">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center border-blue-500/30">
                <i class="fas fa-mobile-alt text-blue-500 text-xl"></i>
            </div>
            <p class="text-[10px] font-bold">VTU</p>
        </a>

        <a href="giftcards.html" class="flex flex-col items-center gap-2 nav-btn">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center border-purple-500/30">
                <i class="fas fa-gift text-purple-500 text-xl"></i>
            </div>
            <p class="text-[10px] font-bold">Gift Card</p>
        </a>

        <a href="wallet.html" class="flex flex-col items-center gap-2 nav-btn">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center border-green-500/30">
                <i class="fas fa-wallet text-green-500 text-xl"></i>
            </div>
            <p class="text-[10px] font-bold">Wallet</p>
        </a>

        <a href="#" class="flex flex-col items-center gap-2 nav-btn">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center border-orange-500/30">
                <i class="fas fa-headset text-orange-500 text-xl"></i>
            </div>
            <p class="text-[10px] font-bold">Support</p>
        </a>

    </div>

    <div class="flex justify-between items-center mb-4">
        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-500">Recent Activity</h3>
        <p class="text-blue-500 text-xs font-bold">See All</p>
    </div>

    <div class="space-y-3">
        <div class="card-glass p-4 rounded-2xl flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500/20 rounded-full flex items-center justify-center text-green-500">
                    <i class="fas fa-arrow-down text-xs"></i>
                </div>
                <div>
                    <p class="text-xs font-bold">Deposit Success</p>
                    <p class="text-[10px] text-slate-500">Today, 10:45 AM</p>
                </div>
            </div>
            <p class="text-xs font-bold text-green-500">+₦5,000</p>
        </div>
    </div>

</body>
</html>
