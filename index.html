<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPay | All-in-One Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #05070a; }
        .bento-card { background: rgba(17, 24, 39, 0.6); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .nav-active { color: #3b82f6; }
    </style>
</head>
<body class="text-slate-200 pb-24">

    <div class="p-6 flex justify-between items-center sticky top-0 bg-[#05070a]/80 backdrop-blur-md z-50">
        <div>
            <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Good Morning</p>
            <h2 class="text-xl font-black tracking-tight">DPay User</h2>
        </div>
        <div class="w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-full flex items-center justify-center border-2 border-white/10 shadow-lg">
            <i class="fas fa-user text-xs"></i>
        </div>
    </div>

    <div class="px-6 space-y-6">
        
        <div class="bento-card p-6 rounded-[2.5rem] relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-600/10 blur-3xl"></div>
            <p class="text-xs text-slate-500 font-bold uppercase tracking-tighter">Total Assets</p>
            <h1 class="text-4xl font-black text-white mt-1">₦250,000.00</h1>
            <div class="flex gap-3 mt-6">
                <button class="flex-1 bg-blue-600 py-3 rounded-2xl font-bold text-xs shadow-lg">Deposit</button>
                <button class="flex-1 bg-white/5 py-3 rounded-2xl font-bold text-xs border border-white/10">Withdraw</button>
            </div>
        </div>

        <h3 class="text-sm font-bold text-slate-500 px-2 uppercase tracking-widest">Exchange Hub</h3>
        <div class="grid grid-cols-2 gap-4">
            <div class="bento-card p-5 rounded-3xl flex flex-col items-center text-center">
                <div class="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center text-purple-400 mb-3">
                    <i class="fas fa-gift text-xl"></i>
                </div>
                <p class="font-bold text-sm">Gift Cards</p>
                <p class="text-[10px] text-slate-500">Sell instantly</p>
            </div>

            <div class="bento-card p-5 rounded-3xl flex flex-col items-center text-center">
                <div class="w-12 h-12 bg-orange-500/10 rounded-2xl flex items-center justify-center text-orange-400 mb-3">
                    <i class="fab fa-bitcoin text-xl"></i>
                </div>
                <p class="font-bold text-sm">Crypto</p>
                <p id="btc-price" class="text-[10px] text-green-400">Loading...</p>
            </div>

            <div class="bento-card p-5 rounded-3xl flex flex-col items-center text-center">
                <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-400 mb-3">
                    <i class="fas fa-phone-alt text-xl"></i>
                </div>
                <p class="font-bold text-sm">Airtime</p>
                <p class="text-[10px] text-slate-500">Sell Recharge</p>
            </div>

            <div class="bento-card p-5 rounded-3xl flex flex-col items-center text-center">
                <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-400 mb-3">
                    <i class="fas fa-bolt text-xl"></i>
                </div>
                <p class="font-bold text-sm">Utility</p>
                <p class="text-[10px] text-slate-500">Data & Bills</p>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-[#05070a]/90 backdrop-blur-xl border-t border-white/5 px-8 py-4 flex justify-between items-center z-[100]">
        <a href="index.html" class="flex flex-col items-center nav-active">
            <i class="fas fa-home text-lg mb-1"></i>
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a href="wallet.html" class="flex flex-col items-center text-slate-600 hover:text-blue-400">
            <i class="fas fa-wallet text-lg mb-1"></i>
            <span class="text-[10px] font-bold">Wallet</span>
        </a>
        <a href="vtu.html" class="flex flex-col items-center text-slate-600 hover:text-blue-400">
            <i class="fas fa-bolt text-lg mb-1"></i>
            <span class="text-[10px] font-bold">Services</span>
        </a>
    </div>

    <script>
        async function fetchPrices() {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const data = await res.json();
            document.getElementById('btc-price').innerText = "$" + data.bitcoin.usd.toLocaleString();
        }
        fetchPrices();
        setInterval(fetchPrices, 30000);
    </script>
</body>
</html>
