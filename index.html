<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Secure Crypto & VTU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans">

    <nav class="flex items-center justify-between px-6 py-4 bg-[#111827] border-b border-slate-800 sticky top-0 z-50">
        <div class="text-2xl font-black tracking-tighter text-blue-500">D<span class="text-white">Pay</span></div>
        <div class="hidden md:flex space-x-8 text-sm font-medium text-slate-400">
            <a href="#" class="hover:text-blue-400 transition">Exchange</a>
            <a href="#" class="hover:text-blue-400 transition">Wallets</a>
            <a href="#" class="hover:text-blue-400 transition">VTU Services</a>
        </div>
        <button class="bg-blue-600 px-6 py-2 rounded-full text-xs font-bold hover:bg-blue-500 transition">Connect Wallet</button>
    </nav>

    <div class="max-w-7xl mx-auto p-6">
        <header class="py-16 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold mb-6 tracking-tight">
                Fast. Secure. <span class="text-blue-500">Decentralized.</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto mb-10">
                The ultimate platform for instant Crypto-to-Fiat exchange and VTU services in Nigeria.
            </p>
            <div class="flex justify-center gap-4">
                <button class="bg-white text-black px-8 py-3 rounded-xl font-bold hover:bg-slate-200">Start Trading</button>
                <button class="bg-slate-800 text-white px-8 py-3 rounded-xl font-bold hover:bg-slate-700">View Rates</button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 hover:border-blue-500 transition cursor-pointer">
                <i class="fa-solid fa-wallet text-blue-500 text-2xl mb-4"></i>
                <h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-2">Portfolio Balance</h3>
                <p class="text-3xl font-bold">₦0.00</p>
            </div>
            <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                <i class="fa-solid fa-bolt text-yellow-500 text-2xl mb-4"></i>
                <h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-2">Quick Airtime</h3>
                <button class="w-full bg-blue-600/10 text-blue-400 border border-blue-600/20 py-2 rounded-lg font-bold">Buy Now</button>
            </div>
            <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800">
                <i class="fa-solid fa-shield-halved text-emerald-500 text-2xl mb-4"></i>
                <h3 class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-2">Security Status</h3>
                <p class="text-emerald-500 font-bold tracking-tight">Encrypted & Active</p>
            </div>
        </section>
    </div>

</body>
</html>
