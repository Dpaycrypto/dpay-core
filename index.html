<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; overflow: hidden; }
        .logo-animate { animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        @keyframes loading {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="logo-animate text-center">
        <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-blue-900/50">
            <i class="fas fa-bolt text-5xl text-white"></i>
        </div>
        <h1 class="text-4xl font-black tracking-tighter text-white">DPay</h1>
        <p class="text-blue-500 text-xs font-bold tracking-[0.3em] mt-2 uppercase">Secure Crypto</p>
    </div>

    <div class="absolute bottom-12 w-32 h-1 bg-slate-900 rounded-full overflow-hidden">
        <div class="w-full h-full bg-blue-600 origin-left animate-[loading_2.5s_ease-in-out]"></div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2500);
    </script>
</body>
</html>
