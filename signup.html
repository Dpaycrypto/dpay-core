<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-8 flex flex-col min-h-screen justify-center">

    <div class="text-center mb-10">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-900/40">
            <i class="fas fa-bolt text-4xl text-white"></i>
        </div>
        <h1 class="text-3xl font-black tracking-tighter">Join DPay</h1>
        <p class="text-slate-500 text-sm mt-2">Start your crypto journey today</p>
    </div>

    <div class="space-y-5">
        <div>
            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block">Full Name</label>
            <input type="text" placeholder="John Doe" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none transition-all">
        </div>

        <div>
            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block">Email Address</label>
            <input type="email" placeholder="name@example.com" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none transition-all">
        </div>

        <div>
            <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2 block">Password</label>
            <input type="password" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none transition-all">
        </div>

        <a href="dashboard.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-center font-black py-5 rounded-2xl shadow-xl shadow-blue-900/30 active:scale-95 transition-all">
            CREATE ACCOUNT
        </a>
    </div>

    <p class="text-center mt-10 text-sm text-slate-500">
        Already have an account? <a href="login.html" class="text-blue-500 font-bold">Sign In</a>
    </p>

</body>
</html>
