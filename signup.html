<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay - Sign Up</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <h2>Create your DPay Account</h2>
    <input type="email" id="email" placeholder="Email Address"><br><br>
    <input type="password" id="pass" placeholder="Password"><br><br>
    <button id="btn" onclick="handleSignup()">VERIFY MY EMAIL</button>

    <script type="module">
        // 2. Firebase Imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 3. Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB3ThhGL7_T5goglQZN5-KlSqeTbSiUvg",
            authDomain: "dpay-core-ec1e6.firebaseapp.com",
            projectId: "dpay-core-ec1e6",
            storageBucket: "dpay-core-ec1e6.firebasestorage.app",
            messagingSenderId: "259076281817",
            appId: "1:259076281817:web:ef8e3f55d3fbb663aaf5c8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleSignup = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn');

            // --- GENERATE RANDOM 6-DIGIT CODE ---
            const otp = Math.floor(100000 + Math.random() * 900000);
            
            btn.innerText = "SENDING CODE...";
            btn.disabled = true;

            try {
                // 4. Create User in Firebase
                await createUserWithEmailAndPassword(auth, email, pass);

                // 5. Send Code via EmailJS using YOUR IDs
                emailjs.send(
                    "service_t1xt52i", 
                    "template_nmwdehj", 
                    {
                        to_email: email, // This matches the {{to_email}} we talked about
                        otp_code: otp,   // This matches the {{otp_code}} in your email
                    }, 
                    "sq_PGY4EB2TDai6P0"
                )
                .then(() => {
                    alert("Success! Code sent to " + email);
                    // Save the code to check it on the next page
                    localStorage.setItem("userOTP", otp);
                    window.location.href = "verify.html"; 
                });

            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "VERIFY MY EMAIL";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
