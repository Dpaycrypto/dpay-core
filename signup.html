<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="p-8 flex flex-col min-h-screen justify-center">

    <div class="text-center mb-10">
        <h1 class="text-3xl font-black tracking-tighter">Create Account</h1>
        <p class="text-slate-500 text-sm mt-2">Join the future of DPay</p>
    </div>

    <div class="space-y-5">
        <input type="text" placeholder="Full Name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none">
        <input type="email" placeholder="Email Address" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none">
        <input type="password" placeholder="Password" class="w-full bg-slate-900 border border-slate-800 rounded-2xl py-4 px-5 focus:outline-none">

        <a href="dashboard.html" class="block w-full bg-blue-600 text-white text-center font-black py-5 rounded-2xl shadow-xl shadow-blue-900/30 active:scale-95 transition-all">
            CREATE ACCOUNT
        </a>
    </div>

    <p class="text-center mt-10 text-sm text-slate-500">
        Already have an account? <a href="login.html" class="text-blue-500 font-bold">Sign In</a>
    </p>

</body>
</html>
