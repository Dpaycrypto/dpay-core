<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070a] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md">
        <h1 class="text-4xl font-black mb-10">Join <span class="text-blue-500">DPay.</span></h1>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="Gmail Address" class="w-full p-4 rounded-2xl bg-black/30 border border-white/10 outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-black/30 border border-white/10 outline-none">
            <button onclick="handleSignup()" id="btn" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase tracking-widest">Create Account</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyB3ThhGL7_T5goglQZN5-KlSqeTbSiUvg", authDomain: "dpay-core-ec1e6.firebaseapp.com", projectId: "dpay-core-ec1e6", storageBucket: "dpay-core-ec1e6.firebasestorage.app", messagingSenderId: "259076281817", appId: "1:259076281817:web:9f6826b3e0b86ce0aaf5c8" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.handleSignup = async () => {
            const btn = document.getElementById('btn');
            btn.innerText = "SENDING LINK...";
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                await sendEmailVerification(userCredential.user);
                alert("Verification link sent to your Gmail!");
                window.location.href = "login.html";
            } catch (e) { alert(e.message); btn.innerText = "CREATE ACCOUNT"; }
        };
    </script>
</body>
</html>
