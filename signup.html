<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay - Sign Up</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #0a4d2e 0%, #052e1c 100%);
            padding: 20px;
        }
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
        }
        h2 { 
            color: #0a4d2e; 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: 30px; 
            text-align: center;
        }
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 12px 0; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #0a4d2e;
            box-shadow: 0 0 0 4px rgba(10, 77, 46, 0.1);
        }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #0a4d2e 0%, #0d6b3f 100%); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 16px;
            text-transform: uppercase;
            margin-top: 10px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10, 77, 46, 0.3);
        }
        button:disabled { 
            background: #ccc; 
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Join DPay</h2>
    <input type="text" id="fullName" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="pass" placeholder="Create Password">
    <button id="btn" onclick="handleSignup()">VERIFY MY EMAIL</button>
</div>

<script type="module">
    // Firebase Modular SDK Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { initializeFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Your Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4",
        authDomain: "dpay-core.firebaseapp.com",
        projectId: "dpay-core",
        storageBucket: "dpay-core.firebasestorage.app",
        messagingSenderId: "415239564375",
        appId: "1:415239564375:web:ac372f11b7243c21a90712"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, {
        experimentalAutoDetectLongPolling: true,
        useFetchStreams: false
    });
    const runtimeProjectId = app.options.projectId || 'unknown-project';
    const runtimeAuthDomain = app.options.authDomain || 'unknown-auth-domain';
    
    // Disable email verification requirement
    auth.settings = { appVerificationDisabledForTesting: true };

    window.handleSignup = async () => {
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value.trim().toLowerCase();
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btn');

        if(!fullName || !email || !pass) return alert("Please fill in all fields");

        // Clear any existing verification data
        localStorage.removeItem('userOTP');
        localStorage.removeItem('emailVerified');
        localStorage.removeItem('userName');

        // Generate a random 6-digit code for the user
        const otp = Math.floor(100000 + Math.random() * 900000);
        
        btn.innerText = "SENDING CODE...";
        btn.disabled = true;

        try {
            const existingMethods = await fetchSignInMethodsForEmail(auth, email);
            if (existingMethods.length > 0) {
                alert(`This email is already registered in Firebase Auth (${existingMethods.join(', ')}). Project: ${runtimeProjectId}, Auth domain: ${runtimeAuthDomain}. Please log in instead.`);
                window.location.href = 'login.html';
                return;
            }

            // 1. Create the user in Firebase
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            const user = userCredential.user;
            const userDocRef = doc(db, 'user', user.uid);
            const projectId = app.options.projectId || 'unknown';

            // 2. Create profile doc in singular "user" collection
            await setDoc(userDocRef, {
                fullName,
                email,
                phone: '',
                isAdmin: false,
                createdAt: serverTimestamp()
            }, { merge: true });

            // 3. Send the code via EmailJS
            emailjs.send(
                "service_t1xt52i",   // Your Service ID
                "template_nmwdehj",  // Your Template ID
                {
                    email: email, // This MUST match the {{email}} in your template
                    otp_code: otp  // This MUST match the {{otp_code}} in your template
                }, 
                "sq_PGY4EB2TDai6P0"   // Your Public Key
            )
            .then(() => {
                alert(`Success! Account created in project ${projectId}. UID: ${user.uid}. Check your Gmail for the code.`);
                localStorage.setItem("userOTP", otp); // Save code locally to verify on next page
                localStorage.setItem("userName", fullName); // Save full name for dashboard
                window.location.href = "verify.html"; // Redirect to verification screen
            });

        } catch (e) {
            // handle common auth errors
            if (e.code === 'auth/email-already-in-use') {
                alert(`That email is already registered. Project: ${runtimeProjectId}, Auth domain: ${runtimeAuthDomain}. Please log in instead.`);
                // ensure any existing session is signed out so user must re-authenticate
                try { await auth.signOut(); } catch {};
                window.location.href = 'login.html';
                return;
            }
            alert(`Signup Error: ${e.message}\nProject: ${runtimeProjectId}\nAuth domain: ${runtimeAuthDomain}`);
            btn.innerText = "VERIFY MY EMAIL";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
