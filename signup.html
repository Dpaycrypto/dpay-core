<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/emailjs.min.js"></script>
</head>
<body class="bg-[#05070a] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md text-center">
        <h1 class="text-4xl font-black mb-2 uppercase italic text-blue-500">DPAY.</h1>
        <p class="text-slate-500 text-sm mb-10">Start selling crypto for Naira today.</p>

        <div class="space-y-4 text-left" id="signup-form">
            <input type="email" id="email" placeholder="Gmail Address" 
                class="w-full p-5 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-blue-500 transition-all">
            
            <input type="tel" id="phone" placeholder="Phone Number (optional)" 
                class="w-full p-5 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-blue-500 transition-all">
            
            <input type="password" id="pass" placeholder="Create Password" 
                class="w-full p-5 rounded-2xl bg-black/40 border border-white/10 outline-none focus:border-blue-500 transition-all">
            
            <button onclick="handleSignup()" id="btn" 
                class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all mt-4">
                Sign Up
            </button>

            <div id="code-section" class="hidden space-y-4 text-left mt-4">
                <input type="text" id="verification-code" placeholder="Enter verification code" 
                    class="w-full p-4 rounded-2xl bg-black/30 border border-white/10 outline-none">
                <button onclick="verifyCode()" id="verify-btn" 
                    class="w-full bg-green-600 p-5 rounded-2xl font-black uppercase">Verify Code</button>
            </div>

        <p class="mt-10 text-sm text-slate-500 font-medium">
            Already have an account? <a href="login.html" class="text-blue-500 font-bold underline">Sign In</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // VERIFIED CONFIG WITH NEW APP ID
        const firebaseConfig = { 
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4", 
            authDomain: "dpay-core.firebaseapp.com", 
            projectId: "dpay-core", 
            storageBucket: "dpay-core.firebasestorage.app", 
            messagingSenderId: "415239564375", 
            appId: "1:415239564375:web:ac372f11b7243c21a90712" 
        };

        // Version 2.0 - Forced Refresh
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Initialize EmailJS - Replace with your public key
        emailjs.init("YOUR_PUBLIC_KEY");

        window.handleSignup = async () => {
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn');

            if(!email || !pass) { 
                alert("Please fill in email and password!"); 
                return; 
            }

            btn.innerText = "SIGNING UP...";
            btn.disabled = true;

            try {
                // Create user in Firebase
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                
                // Generate verification code
                const verificationCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                
                // Store code for verification
                window.generatedCode = verificationCode;
                
                // Send code via EmailJS - Replace with your service and template IDs
                await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
                    to_email: email,
                    code: verificationCode
                });
                
                alert("Verification code sent to " + email + ". Enter it below to complete signup.");
                
                // Hide signup form, show code section
                document.getElementById('signup-form').style.display = 'none';
                document.getElementById('code-section').classList.remove('hidden');
            } catch (e) {
                // Handle errors
                console.error("Firebase Error:", e);
                alert("Error: " + e.code + " - " + e.message);
                btn.innerText = "SIGN UP";
                btn.disabled = false;
            }
        };

        window.verifyCode = async () => {
            const enteredCode = document.getElementById('verification-code').value.toUpperCase();
            if (enteredCode === window.generatedCode) {
                alert("Verification successful! You can now log in.");
                window.location.href = "login.html";
            } else {
                alert("Invalid code. Please try again.");
            }
        };
    </script>
</body>
</html>
