<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background: linear-gradient(135deg, #0a4d2e 0%, #052e1c 100%); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;">
    <div class="w-full max-w-md text-center">
        <h1 class="text-4xl font-black mb-10 italic uppercase">DPAY<span style="color: #10b981;">.</span></h1>
        
        <p class="mb-8 text-sm text-slate-400">
            Need an account? <a href="signup.html" style="color: #10b981; font-weight: bold; text-decoration: underline;">Register here</a>
        </p>

        <div class="space-y-4 text-left">
            <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); outline: none; color: white;">
            <input type="password" id="pass" placeholder="Password" style="width: 100%; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); outline: none; color: white; margin-top: 16px;">
            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button type="button" onclick="handleForgotPassword()" style="background: transparent; border: none; color: #86efac; font-weight: 700; cursor: pointer; text-decoration: underline; padding: 0;">
                    Forgot Password?
                </button>
            </div>
            <button onclick="handleLogin()" id="btn" style="width: 100%; background: linear-gradient(135deg, #0a4d2e 0%, #0d6b3f 100%); color: white; padding: 20px; border-radius: 16px; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; margin-top: 16px;">Sign In</button>
        </div>
    </div>
    <script type="module">
        // Firebase imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4", 
            authDomain: "dpay-core.firebaseapp.com", 
            projectId: "dpay-core", 
            storageBucket: "dpay-core.firebasestorage.app", 
            messagingSenderId: "415239564375", 
            appId: "1:415239564375:web:ac372f11b7243c21a90712" 
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleForgotPassword = async function() {
            const email = document.getElementById('email').value.trim();

            if (!email) {
                alert("Enter your email first, then tap Forgot Password.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("Password reset link sent. Check your email inbox/spam.");
            } catch (e) {
                console.error("Password reset error:", e);

                if (e.code === 'auth/invalid-email') {
                    alert("That email format is invalid.");
                } else if (e.code === 'auth/user-not-found') {
                    alert("No account exists with that email.");
                } else {
                    alert("Could not send reset link: " + e.message);
                }
            }
        };

        // Define the handleLogin function and attach it to window
        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn');
            
            if (!email || !pass) {
                alert("Please enter both email and password");
                return;
            }
            
            btn.innerText = "SIGNING IN...";
            btn.disabled = true;
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                // Successfully signed in - redirect to dashboard
                // Note: OTP verification is only required during signup, not for existing accounts
                window.location.href = "dashboard.html";
                
            } catch (e) {
                console.error("Login error:", e);
                
                // Handle specific Firebase auth errors
                if (e.code === 'auth/user-not-found') {
                    alert("No account found with this email. Please sign up first.");
                } else if (e.code === 'auth/wrong-password') {
                    alert("Incorrect password. Please try again.");
                } else if (e.code === 'auth/invalid-email') {
                    alert("Invalid email format.");
                } else if (e.code === 'auth/user-disabled') {
                    alert("This account has been disabled.");
                } else if (e.code === 'auth/too-many-requests') {
                    alert("Too many failed login attempts. Please try again later.");
                } else {
                    alert("Login failed: " + e.message);
                }
                
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        };

        // Ensure the function is available immediately
        console.log("handleLogin function attached to window:", typeof window.handleLogin);

        // Also attach on DOM ready as backup
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.handleLogin === 'function') {
                console.log("handleLogin is ready on DOM load");
            }
        });
    </script>
