<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070a] text-white flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md text-center">
        <h1 class="text-4xl font-black mb-10 italic uppercase">DPAY<span class="text-blue-500">.</span></h1>
        
        <p class="mb-8 text-sm text-slate-400">
            Need an account? <a href="signup.html" class="text-blue-500 font-bold underline">Register here</a>
        </p>

        <div class="space-y-4 text-left">
            <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-black/30 border border-white/10 outline-none">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-black/30 border border-white/10 outline-none">
            <button onclick="handleLogin()" id="btn" class="w-full bg-blue-600 p-5 rounded-2xl font-black uppercase">Sign In</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // VERIFIED CONFIG - PLEASE DO NOT CHANGE THESE CHARACTERS
        const firebaseConfig = { 
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4", 
            authDomain: "dpay-core.firebaseapp.com", 
            projectId: "dpay-core", 
            storageBucket: "dpay-core.firebasestorage.app", 
            messagingSenderId: "415239564375", 
            appId: "1:415239564375:web:ac372f11b7243c21a90712" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn');
            
            if (!email || !pass) {
                alert("Please enter both email and password");
                return;
            }
            
            btn.innerText = "SIGNING IN...";
            btn.disabled = true;
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                // Check if user has completed OTP verification
                const isVerified = localStorage.getItem('emailVerified') === 'true';
                
                if (!isVerified) {
                    alert("Please complete email verification first. Check your email for the verification code.");
                    // Sign out and redirect to verify
                    await auth.signOut();
                    window.location.href = "verify.html";
                    return;
                }
                
            } catch (e) {
                console.error("Login error:", e);
                
                // Handle specific Firebase auth errors
                if (e.code === 'auth/user-not-found') {
                    alert("No account found with this email. Please sign up first.");
                } else if (e.code === 'auth/wrong-password') {
                    alert("Incorrect password. Please try again.");
                } else if (e.code === 'auth/invalid-email') {
                    alert("Invalid email format.");
                } else if (e.code === 'auth/user-disabled') {
                    alert("This account has been disabled.");
                } else if (e.code === 'auth/too-many-requests') {
                    alert("Too many failed login attempts. Please try again later.");
                } else {
                    alert("Login failed: " + e.message);
                }
                
                btn.innerText = "SIGN IN";
                btn.disabled = false;
            }
        };
