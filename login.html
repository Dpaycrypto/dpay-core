<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background: linear-gradient(135deg, #0a4d2e 0%, #052e1c 100%); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;">
    <div class="w-full max-w-md text-center">
        <h1 class="text-4xl font-black mb-10 italic uppercase">DPAY<span style="color: #10b981;">.</span></h1>
        
        <p class="mb-8 text-sm text-slate-400">
            Need an account? <a href="signup.html" style="color: #10b981; font-weight: bold; text-decoration: underline;">Register here</a>
        </p>

        <div class="space-y-4 text-left">
            <input type="email" id="email" placeholder="Email" style="width: 100%; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); outline: none; color: white;">
            <input type="password" id="pass" placeholder="Password" style="width: 100%; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); outline: none; color: white; margin-top: 16px;">
            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button type="button" onclick="handleForgotPassword()" style="background: transparent; border: none; color: #86efac; font-weight: 700; cursor: pointer; text-decoration: underline; padding: 0;">
                    Forgot Password?
                </button>
            </div>
            <button onclick="handleLogin()" id="btn" style="width: 100%; background: linear-gradient(135deg, #0a4d2e 0%, #0d6b3f 100%); color: white; padding: 20px; border-radius: 16px; font-weight: 700; text-transform: uppercase; border: none; cursor: pointer; margin-top: 16px;">Sign In</button>
        </div>

        <div id="adminDebugBox" style="display:none; margin-top:16px; text-align:left; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 12px;">
            <div style="font-size:12px; font-weight:700; color:#86efac; margin-bottom:8px;">Admin Check Debug</div>
            <pre id="adminDebugText" style="margin:0; white-space:pre-wrap; word-break:break-word; font-size:12px; color:#e2e8f0;"></pre>
            <button id="continueBtn" type="button" style="display:none; margin-top:10px; width:100%; background:#10b981; color:#052e1c; border:none; border-radius:10px; padding:10px; font-weight:800; cursor:pointer;">
                Continue
            </button>
        </div>
    </div>
    <script type="module">
        // Firebase imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDocFromServer, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase configuration
        const firebaseConfig = { 
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4", 
            authDomain: "dpay-core.firebaseapp.com", 
            projectId: "dpay-core", 
            storageBucket: "dpay-core.firebasestorage.app", 
            messagingSenderId: "415239564375", 
            appId: "1:415239564375:web:ac372f11b7243c21a90712" 
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const continueBtn = document.getElementById('continueBtn');
        let pendingRedirectUrl = null;

        function setAdminDebug(text) {
            const box = document.getElementById('adminDebugBox');
            const textEl = document.getElementById('adminDebugText');
            box.style.display = 'block';
            textEl.textContent = text;
        }

        function prepareContinue(url) {
            pendingRedirectUrl = url;
            continueBtn.style.display = 'block';
        }

        continueBtn.addEventListener('click', () => {
            if (pendingRedirectUrl) {
                window.location.href = pendingRedirectUrl;
            }
        });

        window.handleForgotPassword = async function() {
            const email = document.getElementById('email').value.trim();

            if (!email) {
                alert("Enter your email first, then tap Forgot Password.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("Password reset link sent. Check your email inbox/spam.");
            } catch (e) {
                console.error("Password reset error:", e);

                if (e.code === 'auth/invalid-email') {
                    alert("That email format is invalid.");
                } else if (e.code === 'auth/user-not-found') {
                    alert("No account exists with that email.");
                } else {
                    alert("Could not send reset link: " + e.message);
                }
            }
        };

        // Define the handleLogin function and attach it to window
        window.handleLogin = async function() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn');
            
            if (!email || !pass) {
                alert("Please enter both email and password");
                return;
            }
            
            btn.innerText = "SIGNING IN...";
            btn.disabled = true;
            setAdminDebug('Signing in...');
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                const userDocRef = doc(db, 'user', user.uid);
                let isAdmin = false;
                const tokenInfo = await user.getIdTokenResult();
                const projectId = app.options.projectId || 'unknown';

                setAdminDebug(`projectId: ${projectId}\nissuer: ${tokenInfo.issuer || 'unknown'}\nuid: ${user.uid}\npath: user/${user.uid}\nstep: signed in, checking admin doc from server...`);

                try {
                    let docSnap;
                    try {
                        docSnap = await getDocFromServer(userDocRef);
                    } catch (serverErr) {
                        if (serverErr?.code === "unavailable") {
                            // Fallback read when server fetch fails due transient offline/network issue.
                            docSnap = await getDoc(userDocRef);
                        } else {
                            throw serverErr;
                        }
                    }
                    if (!docSnap.exists()) {
                        await setDoc(userDocRef, {
                            email: user.email || email,
                            fullName: localStorage.getItem('userName') || user.displayName || '',
                            phone: '',
                            isAdmin: false,
                            createdAt: serverTimestamp()
                        }, { merge: true });
                        setAdminDebug(`projectId: ${projectId}\nissuer: ${tokenInfo.issuer || 'unknown'}\nuid: ${user.uid}\npath: user/${user.uid}\ndocExists: false -> created\nisAdmin(raw): false\nredirect: dashboard.html`);
                        isAdmin = false;
                        prepareContinue("dashboard.html");
                        btn.innerText = "Sign In";
                        btn.disabled = false;
                        return;
                    }

                    isAdmin = docSnap.exists() && docSnap.data().isAdmin === true;
                    const rawAdminValue = docSnap.exists() ? String(docSnap.data().isAdmin) : 'MISSING_DOC';
                    setAdminDebug(`projectId: ${projectId}\nissuer: ${tokenInfo.issuer || 'unknown'}\nuid: ${user.uid}\npath: user/${user.uid}\ndocExists: ${docSnap.exists()}\nisAdmin(raw): ${rawAdminValue}\nredirect: ${isAdmin ? 'admin.html' : 'dashboard.html'}`);
                } catch (docError) {
                    console.warn("Could not read user profile document:", docError);
                    setAdminDebug(`projectId: ${projectId}\nissuer: ${tokenInfo.issuer || 'unknown'}\nuid: ${user.uid}\npath: user/${user.uid}\nerrorCode: ${docError?.code || 'unknown'}\nerrorMessage: ${docError?.message || 'unknown'}\nredirect: dashboard.html`);
                    if (docError?.code === "permission-denied") {
                        alert("Signed in, but Firestore rules blocked admin check. Update your Firestore rules for /user/{uid} reads.");
                    }
                }

                prepareContinue(isAdmin ? "admin.html" : "dashboard.html");
                btn.innerText = "Sign In";
                btn.disabled = false;
                return;
                
            } catch (e) {
                console.error("Login error:", e);
                
                // Handle specific Firebase auth errors
                if (e.code === 'auth/invalid-credential') {
                    alert("Invalid email or password. If you forgot it, use 'Forgot Password?'.");
                } else if (e.code === 'auth/user-not-found') {
                    alert("No account found with this email. Please sign up first.");
                } else if (e.code === 'auth/wrong-password') {
                    alert("Incorrect password. Please try again.");
                } else if (e.code === 'auth/invalid-email') {
                    alert("Invalid email format.");
                } else if (e.code === 'auth/user-disabled') {
                    alert("This account has been disabled.");
                } else if (e.code === 'auth/too-many-requests') {
                    alert("Too many failed login attempts. Wait a few minutes, then try again or reset your password.");
                } else if (e.code === 'auth/network-request-failed') {
                    alert("Network error. Check internet connection and try again.");
                } else {
                    alert("Login failed: " + e.message);
                }
                
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        };

        // Ensure the function is available immediately
        console.log("handleLogin function attached to window:", typeof window.handleLogin);

        // Also attach on DOM ready as backup
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.handleLogin === 'function') {
                console.log("handleLogin is ready on DOM load");
            }
        });
    </script>
