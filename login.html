<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .input-field { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .input-field:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-md text-center">
        <h1 class="text-4xl font-black tracking-tighter mb-2 italic">DPAY<span class="text-blue-500">.</span></h1>
        <p class="text-slate-500 text-sm mb-10 font-medium">Welcome back, please login to your wallet.</p>

        <div class="space-y-4 text-left">
            <div class="space-y-2">
                <label class="text-[10px] uppercase font-black text-slate-500 ml-1">Email Address</label>
                <input type="email" id="login-email" placeholder="name@gmail.com" 
                    class="input-field w-full py-4 px-5 rounded-2xl outline-none text-sm text-white">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] uppercase font-black text-slate-500 ml-1">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" 
                    class="input-field w-full py-4 px-5 rounded-2xl outline-none text-sm text-white">
            </div>

            <button onclick="handleLogin()" id="login-btn"
                class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl transition-all active:scale-95 mt-4">
                Sign In
            </button>
        </div>

        <p class="mt-8 text-sm text-slate-500">
            Don't have an account? <a href="signup.html" class="text-blue-500 font-bold">Register</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // VERIFIED CONFIG FROM YOUR SCREEN
        const firebaseConfig = {
            apiKey: "AIzaSyB3ThhGL7_T5goglQZN5-KlSqeTbSiUvg",
            authDomain: "dpay-core-ec1e6.firebaseapp.com",
            projectId: "dpay-core-ec1e6",
            storageBucket: "dpay-core-ec1e6.firebasestorage.app",
            messagingSenderId: "259076281817",
            appId: "1:259076281817:web:9f6826b3e0b86ce0aaf5c8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleLogin = async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');

            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Check if they verified their Gmail
                if (user.emailVerified) {
                    window.location.href = "dashboard.html"; 
                } else {
                    alert("Please verify your email! Check your Gmail inbox for the link we sent.");
                    btn.innerText = "SIGN IN";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Login Failed: " + error.message);
                btn.innerText = "SIGN IN";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
