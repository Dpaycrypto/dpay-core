<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay - Join</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #0d1117; color: white; }
        .signup-box { background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:disabled { background-color: #23863680; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="signup-box">
    <h2>Create Account</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="pass" placeholder="Password">
    <button id="btn" onclick="handleSignup()">VERIFY MY EMAIL</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Your Exact Firebase Config from Screenshot
    const firebaseConfig = {
        apiKey: "AIzaSyB3ThhGL7_T5goglQZN5-KlSqeTbSiUvg",
        authDomain: "dpay-core-ec1e6.firebaseapp.com",
        projectId: "dpay-core-ec1e6",
        storageBucket: "dpay-core-ec1e6.firebasestorage.app",
        messagingSenderId: "259076281817",
        appId: "1:259076281817:web:9f6826b3e0b86ce0aaf5c8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.handleSignup = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btn');

        if (!email || !pass) return alert("Please fill in all fields");

        // Generate 6-digit code
        const otp = Math.floor(100000 + Math.random() * 900000);
        
        btn.innerText = "SENDING CODE...";
        btn.disabled = true;

        try {
            // 1. Create User (Modular V10 Syntax)
            await createUserWithEmailAndPassword(auth, email, pass);

            // 2. Send via EmailJS using your IDs
            emailjs.send(
                "service_t1xt52i", 
                "template_nmwdehj", 
                {
                    email: email, // Matches {{email}} in your template
                    otp_code: otp  // Matches {{otp_code}} in your email body
                }, 
                "sq_PGY4EB2TDai6P0" // Your Public Key
            )
            .then(() => {
                alert("Verification code sent to " + email);
                localStorage.setItem("userOTP", otp);
                window.location.href = "verify.html"; 
            })
            .catch((err) => {
                alert("EmailJS Error: " + JSON.stringify(err));
                btn.disabled = false;
                btn.innerText = "VERIFY MY EMAIL";
            });

        } catch (e) {
            alert("Signup Error: " + e.message);
            btn.innerText = "VERIFY MY EMAIL";
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
