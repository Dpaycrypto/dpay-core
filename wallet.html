<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 pb-24">
    <div class="flex items-center gap-4 mb-8">
        <a href="dashboard.html" class="w-10 h-10 card-glass rounded-full flex items-center justify-center"><i class="fas fa-arrow-left text-blue-500"></i></a>
        <h1 class="text-2xl font-bold">My Assets</h1>
    </div>

    <div class="text-center mb-10 p-6 card-glass rounded-[2rem]">
        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Live Portfolio</p>
        <h2 class="text-4xl font-black">$0.00</h2>
    </div>

    <div class="space-y-4">
        <div class="card-glass p-4 rounded-2xl flex justify-between">
            <div class="flex gap-3">
                <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center"><i class="fab fa-bitcoin"></i></div>
                <div><p class="font-bold text-sm">Bitcoin</p><p class="text-[9px] text-slate-500 font-bold">BTC</p></div>
            </div>
            <div class="text-right">
                <p class="font-bold text-sm">0.0000</p>
                <p id="btc-price" class="text-[9px] text-blue-400 font-bold">Loading...</p>
            </div>
        </div>
        </div>

    <script>
        // LIVE PRICE ENGINE
        async function getPrices() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether&vs_currencies=usd');
                const data = await response.json();
                document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
            } catch (error) {
                document.getElementById('btc-price').innerText = 'Syncing...';
            }
        }
        setInterval(getPrices, 10000); // Update every 10 seconds
        getPrices();
    </script>
</body>
</html>
