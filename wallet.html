<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | My Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .network-btn:active { transform: scale(0.95); transition: 0.2s; }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="flex items-center gap-4 mb-8">
        <a href="index.html" class="w-10 h-10 card-glass rounded-full flex items-center justify-center network-btn">
            <i class="fas fa-arrow-left text-blue-500"></i>
        </a>
        <h1 class="text-2xl font-bold tracking-tight">My Assets</h1>
    </div>

    <div class="text-center mb-10 p-6 card-glass rounded-[2rem]">
        <p class="text-slate-500 text-xs uppercase tracking-widest mb-2 font-bold">Portfolio Value</p>
        <h2 class="text-4xl font-black mb-2">$0.00</h2>
        <p class="text-slate-600 text-[10px] mt-2 font-medium">All live rates will sync once your backend is connected.</p>
    </div>

    <h3 class="text-sm font-bold mb-4 uppercase tracking-wider text-slate-500">Holdings</h3>
    <div class="space-y-4">
        
        <div class="card-glass p-4 rounded-2xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-white text-lg font-bold">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div>
                    <p class="font-bold text-sm">Tether</p>
                    <p class="text-[10px] text-slate-500 uppercase tracking-tighter font-bold">USDT</p>
                </div>
            </div>
            <div class="text-right">
                <p class="font-bold text-sm">0.00</p>
                <p class="text-[10px] text-slate-500">$----.--</p>
            </div>
        </div>

        <div class="card-glass p-4 rounded-2xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-orange-500/20 border-2 border-orange-500/40 rounded-full flex items-center justify-center text-orange-500 text-lg">
                    <i class="fab fa-bitcoin"></i>
                </div>
                <div>
                    <p class="font-bold text-sm">Bitcoin</p>
                    <p class="text-[10px] text-slate-500 uppercase tracking-tighter font-bold">BTC</p>
                </div>
            </div>
            <div class="text-right">
                <p class="font-bold text-sm">0.00</p>
                <p class="text-[10px] text-slate-500">$----.--</p>
            </div>
        </div>

        <div class="card-glass p-4 rounded-2xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-500 rounded-full flex items-center justify-center text-white text-lg">
                    <i class="fab fa-ethereum"></i>
                </div>
                <div>
                    <p class="font-bold text-sm">Ethereum</p>
                    <p class="text-[10px] text-slate-500 uppercase tracking-tighter font-bold">ETH</p>
                </div>
            </div>
            <div class="text-right">
                <p class="font-bold text-sm">0.00</p>
                <p class="text-[10px] text-slate-500">$----.--</p>
            </div>
        </div>

    </div>

    <div class="mt-8 grid grid-cols-2 gap-4">
        <button class="py-4 bg-slate-900 border border-slate-800 rounded-2xl font-bold text-xs uppercase tracking-widest network-btn">Swap</button>
        <button class="py-4 bg-blue-600 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-blue-900/30 network-btn">Transfer</button>
    </div>

</body>
</html>
