<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; }
        .card-glass { background: linear-gradient(145deg, rgba(17, 24, 39, 0.8), rgba(10, 15, 25, 0.8)); border: 1px solid rgba(255,255,255,0.05); }
        .btc-gradient { background: linear-gradient(135deg, #f7931a, #ffab40); }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-10">
        <a href="dashboard.html" class="text-slate-400"><i class="fas fa-arrow-left"></i></a>
        <h1 class="text-xl font-black tracking-tight">Portfolio</h1>
        <i class="fas fa-chart-line text-blue-500"></i>
    </div>

    <div class="card-glass p-8 rounded-[2.5rem] mb-10 text-center shadow-2xl">
        <p class="text-slate-500 text-[10px] uppercase font-bold tracking-[0.2em] mb-2">Assets Value</p>
        <h2 class="text-4xl font-black">$0.00</h2>
        <p class="text-green-500 text-[10px] font-bold mt-2">+0.00% (24h)</p>
    </div>

    <div class="space-y-4">
        <div class="card-glass p-5 rounded-[2rem] flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 btc-gradient rounded-full flex items-center justify-center text-white text-xl shadow-lg shadow-orange-500/20"><i class="fab fa-bitcoin"></i></div>
                <div><p class="font-bold">Bitcoin</p><p class="text-[10px] text-slate-500 font-bold tracking-widest">BTC</p></div>
            </div>
            <div class="text-right">
                <p class="font-black text-sm">0.00</p>
                <p id="btc-price" class="text-[10px] text-orange-500 font-bold">Syncing...</p>
            </div>
        </div>
        <div class="card-glass p-5 rounded-[2rem] flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-white text-xl shadow-lg shadow-green-500/20"><i class="fas fa-dollar-sign"></i></div>
                <div><p class="font-bold">Tether</p><p class="text-[10px] text-slate-500 font-bold tracking-widest">USDT</p></div>
            </div>
            <div class="text-right">
                <p class="font-black text-sm">0.00</p>
                <p class="text-[10px] text-green-500 font-bold">$1.00</p>
            </div>
        </div>
    </div>
</body>
</html>
