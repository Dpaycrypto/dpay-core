<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .card-glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 pb-24">

    <div class="flex justify-between items-center mb-8">
        <div>
            <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Account Overview</p>
            <h1 class="text-2xl font-black">DPay User</h1>
        </div>
        <a href="profile.html" class="active:scale-90 transition-transform">
            <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i class="fas fa-user text-white"></i>
            </div>
        </a>
    </div>

    <div class="card-glass p-8 rounded-[2.5rem] mb-10 text-center relative overflow-hidden">
        <p class="text-slate-400 text-sm mb-2">Total Balance</p>
        <h2 class="text-5xl font-black tracking-tighter">₦0.00</h2>
        <div class="flex gap-3 mt-8">
            <a href="deposit.html" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20"><i class="fas fa-plus-circle"></i> Deposit</a>
            <a href="withdraw.html" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold text-xs flex items-center justify-center gap-2"><i class="fas fa-arrow-up"></i> Withdraw</a>
        </div>
    </div>

    <h3 class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-4 px-2">Quick Services</h3>
    <div class="grid grid-cols-4 gap-4 mb-10">
        <a href="vtu.html" class="text-center">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center mx-auto mb-2 text-blue-500 shadow-xl"><i class="fas fa-mobile-alt"></i></div>
            <span class="text-[10px] font-bold">VTU</span>
        </a>
        <a href="giftcards.html" class="text-center">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center mx-auto mb-2 text-purple-500 shadow-xl"><i class="fas fa-gift"></i></div>
            <span class="text-[10px] font-bold">Gift Card</span>
        </a>
        <a href="wallet.html" class="text-center">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center mx-auto mb-2 text-green-500 shadow-xl"><i class="fas fa-wallet"></i></div>
            <span class="text-[10px] font-bold">Wallet</span>
        </a>
        <a href="support.html" class="text-center">
            <div class="w-14 h-14 card-glass rounded-2xl flex items-center justify-center mx-auto mb-2 text-orange-500 shadow-xl"><i class="fas fa-headset"></i></div>
            <span class="text-[10px] font-bold">Support</span>
        </a>
    </div>

    <h3 class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-4 px-2">Recent Activity</h3>
    <div class="card-glass rounded-3xl p-10 flex flex-col items-center border-dashed border-slate-800">
        <i class="fas fa-receipt text-3xl text-slate-800 mb-3 opacity-20"></i>
        <p class="text-slate-600 text-[10px] font-medium uppercase tracking-tighter">No transactions yet</p>
    </div>

</body>
</html>
