<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DPay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a4d2e 0%, #052e1c 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header-left h2 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header-left h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 18px;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.9) 100%);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .balance-label {
            color: #666;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .balance-amount {
            color: #0a4d2e;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 25px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-deposit {
            background: linear-gradient(135deg, #0a4d2e 0%, #0d6b3f 100%);
            color: white;
        }

        .btn-deposit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10, 77, 46, 0.3);
        }

        .btn-withdraw {
            background: rgba(10, 77, 46, 0.1);
            color: #0a4d2e;
        }

        .btn-withdraw:hover {
            background: rgba(10, 77, 46, 0.2);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .service-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(10, 77, 46, 0.1) 0%, rgba(13, 107, 63, 0.1) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            color: #0a4d2e;
        }

        .service-card h3 {
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }

        .activity-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
        }

        .activity-header {
            color: #0a4d2e;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .no-activity {
            border: 2px dashed #ddd;
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            color: #999;
        }

        .no-activity i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .no-activity p {
            font-size: 16px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header-left h1 {
                font-size: 24px;
            }

            .balance-amount {
                font-size: 36px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .services-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body class="p-6">
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h2>ACCOUNT OVERVIEW</h2>
                <h1 id="userName">Welcome Back</h1>
            </div>
            <div class="header-right">
                <button class="icon-btn" onclick="window.location.href='settings.html'" title="Settings">
                    <i class="fas fa-cog"></i>
                </button>
                <button class="icon-btn" onclick="handleLogout()" title="Sign Out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>

        <div class="balance-card">
            <div class="balance-label">Total Balance</div>
            <div class="balance-amount">₦0.00</div>
            <div class="action-buttons">
                <a href="deposit.html" class="btn btn-deposit">
                    <i class="fas fa-plus"></i>
                    Deposit
                </a>
                <a href="withdraw.html" class="btn btn-withdraw">
                    <i class="fas fa-arrow-up"></i>
                    Withdraw
                </a>
            </div>
        </div>

        <div class="services-grid">
            <a href="vtu.html" class="service-card">
                <div class="service-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h3>VTU</h3>
            </a>
            <a href="giftcards.html" class="service-card">
                <div class="service-icon">
                    <i class="fas fa-gift"></i>
                </div>
                <h3>Gift Card</h3>
            </a>
            <a href="crypto.html" class="service-card">
                <div class="service-icon">
                    <i class="fab fa-bitcoin"></i>
                </div>
                <h3>Crypto</h3>
            </a>
            <a href="support.html" class="service-card">
                <div class="service-icon">
                    <i class="fas fa-headset"></i>
                </div>
                <h3>Support</h3>
            </a>
        </div>

        <div class="activity-section">
            <div class="activity-header">RECENT ACTIVITY</div>
            <div class="no-activity">
                <i class="fas fa-receipt"></i>
                <p>NO TRANSACTIONS YET</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC7hyJXJi2ilZd4owjWesMyi5FHo_1M2I4",
            authDomain: "dpay-core.firebaseapp.com",
            projectId: "dpay-core",
            storageBucket: "dpay-core.firebasestorage.app",
            messagingSenderId: "415239564375",
            appId: "1:415239564375:web:ac372f11b7243c21a90712"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    let userName = 'Welcome Back';
                    
                    if (userDoc.exists()) {
                        userName = userDoc.data().fullName || user.displayName || 'Welcome Back';
                    } else {
                        userName = localStorage.getItem('userName') || user.displayName || 'Welcome Back';
                    }
                    
                    document.getElementById('userName').textContent = userName;
                } catch (error) {
                    console.error('Error loading user data:', error);
                    const userName = localStorage.getItem('userName') || user.displayName || 'Welcome Back';
                    document.getElementById('userName').textContent = userName;
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        window.handleLogout = async function() {
            try {
                await signOut(auth);
                window.location.href = 'login.html';
            } catch (error) {
                console.error('Logout error:', error);
                alert('Error signing out. Please try again.');
            }
        };
    </script>
</body>
</html>
