<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPay | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#020408] text-white p-6">
    <nav class="flex justify-between items-center max-w-lg mx-auto mb-10">
        <h1 class="text-xl font-bold italic">DPAY</h1>
        <button onclick="logout()" class="text-[10px] text-slate-500 font-black uppercase">Sign Out</button>
    </nav>
    <main class="max-w-lg mx-auto">
        <div class="bg-slate-900/50 p-10 rounded-[2.5rem] border border-white/5 text-center mb-10">
            <p id="user-email" class="text-blue-500 text-xs mb-4">Loading...</p>
            <h3 class="text-5xl font-black">$0.00</h3>
        </div>
        <a href="sell.html" class="block w-full bg-emerald-600 p-5 rounded-2xl text-center font-black uppercase tracking-widest">Sell Crypto for Naira</a>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyB3ThhGL7_T5goglQZN5-KlSqeTbSiUvg", authDomain: "dpay-core-ec1e6.firebaseapp.com", projectId: "dpay-core-ec1e6", storageBucket: "dpay-core-ec1e6.firebasestorage.app", messagingSenderId: "259076281817", appId: "1:259076281817:web:9f6826b3e0b86ce0aaf5c8" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => { 
            if (user) { document.getElementById('user-email').innerText = user.email; } 
            else { window.location.href = "login.html"; } 
        });
        window.logout = () => signOut(auth).then(() => window.location.href = "login.html");
    </script>
</body>
</html>
